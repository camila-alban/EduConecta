<!DOCTYPE html> 
 <html lang="pt-br"> 
 <head> 
     <meta charset="UTF-8"> 
     <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
     <title>EduConecta - Oportunidades para você</title> 
     <link rel="stylesheet" href="style.css"> 
     <link rel="preconnect" href="https://fonts.googleapis.com"> 
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> 
     <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"> 
 </head> 
 <body> 
     <div id="app"> 
         <header class="main-header"> 
             <div class="logo"> 
                 <span class="logo-icon">🎓</span> 
                 <h1>EduConecta</h1> 
             </div> 
             <button id="search-btn" class="icon-btn">🔍</button> 
         </header> 
         <main id="content"> 
         </main> 
         <nav class="bottom-nav">
             <button class="nav-item active" data-view="home">
                 <span class="nav-icon">🏠</span>
                 <span class="nav-label">Início</span>
             </button>
             <button class="nav-item" data-view="saved">
                 <span class="nav-icon">❤️</span>
                 <span class="nav-label">Salvos</span>
             </button>
             <button class="nav-item" data-view="profile">
                 <span class="nav-icon">👤</span>
                 <span class="nav-label">Perfil</span>
             </button>
         </nav>

         <template id="home-template"> 
             <div class="view-home"> 
                 <section class="welcome-banner"> 
                     <div class="banner-content"> 
                         <h2>Olá! 👋</h2> 
                         <p>O que vamos aprender hoje?</p> 
                     </div> 
                 </section> 
  
                 <nav class="filters"> 
                     <button class="filter-chip active" data-filter="todas">Tudo</button> 
                     <button class="filter-chip" data-filter="cursos">Cursos</button> 
                     <button class="filter-chip" data-filter="eventos">Eventos</button> 
                     <button class="filter-chip" data-filter="vagas">Vagas</button> 
                     <button class="filter-chip" data-filter="workshops">Workshops</button> 
                 </nav> 
  
                 <section class="opportunities-list" id="opportunities-list"> 
                 </section> 
             </div> 
         </template> 
  
         <template id="saved-template">
             <div class="view-saved">
                 <header class="view-header">
                     <h2>Salvos</h2>
                 </header>
                 <section id="saved-list" class="opportunities-list">
                 </section>
             </div>
         </template>

         <template id="profile-template"> 
             <div class="view-profile"> 
                 <header class="view-header">
                     <h2>Meu Perfil</h2>
                 </header>
                 <div class="profile-card"> 
                     <div class="profile-avatar">👤</div> 
                     <div class="profile-info">
                         <h3>Usuário</h3> 
                         <p>user@gmail.com</p> 
                     </div>
                     <button class="btn-edit-profile">✏️</button> 
                 </div> 
  
                 <section class="activity-section"> 
                     <div class="activity-grid"> 
                         <div class="activity-card"> 
                             <span class="act-count">1</span> 
                             <span class="act-label">Inscritos</span> 
                         </div> 
                         <div class="activity-card"> 
                             <span class="act-count">1</span> 
                             <span class="act-label">Salvos</span> 
                         </div> 
                         <div class="activity-card"> 
                             <span class="act-count">12</span> 
                             <span class="act-label">Vistos</span> 
                         </div> 
                     </div> 
                 </section> 
  
                 <div class="settings-list">
                     <button class="settings-item"><span>🔔</span> Notificações</button>
                     <button class="settings-item"><span>🛠️</span> Preferências</button>
                     <button class="settings-item"><span>❓</span> Ajuda</button>
                 </div>

                 <button class="btn-logout">Sair da conta</button> 
             </div> 
         </template> 
     </div> 
     <script src="script.js"></script> 
 </body> 
 </html>
